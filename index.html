<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Contas - Leonardo & Anna</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { display: inline-block; margin-right: 10px; margin-bottom: 10px; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        button { background: #2a5298; color: white; cursor: pointer; border: none; }
        button:hover { background: #1e3c72; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .pago { color: green; font-weight: bold; }
        .pendente { color: orange; font-weight: bold; }
        .total-card { display: inline-block; width: 30%; margin: 10px; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: center; }
        .total-valor { font-size: 24px; font-weight: bold; color: #2a5298; }
        .sync-status { padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 10px; }
        .online { background: #27ae60; color: white; }
        .offline { background: #e74c3c; color: white; }
        .btn-mes { padding: 8px 15px; margin: 0 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Controle de Contas</h1>
            <p>Leonardo 💙 & Anna Bárbara ❤️</p>
            <div id="syncStatus" class="sync-status">🔄 Conectando...</div>
        </div>

        <div class="card">
            <h3>➕ Adicionar Conta</h3>
            <div class="form-group">
                <input type="date" id="data" style="width: 130px;">
            </div>
            <div class="form-group">
                <input type="text" id="descricao" placeholder="Descrição" style="width: 200px;">
            </div>
            <div class="form-group">
                <select id="categoria">
                    <option value="Moradia">🏠 Moradia</option>
                    <option value="Utilidades">💡 Utilidades</option>
                    <option value="Alimentação">🍎 Alimentação</option>
                    <option value="Educação">📚 Educação</option>
                    <option value="Saúde">🏥 Saúde</option>
                    <option value="Extras">🎉 Extras</option>
                </select>
            </div>
            <div class="form-group">
                <input type="number" id="valor" placeholder="Valor R$" step="0.01" style="width: 120px;">
            </div>
            <div class="form-group">
                <select id="quem">
                    <option value="Leonardo">💙 Leonardo</option>
                    <option value="Anna">❤️ Anna</option>
                </select>
            </div>
            <div class="form-group">
                <button onclick="adicionarConta()">✅ Adicionar</button>
            </div>
        </div>

        <div class="card">
            <div style="text-align: center; margin-bottom: 15px;">
                <button class="btn-mes" onclick="mudarMes(-1)">◀ Mês Anterior</button>
                <strong id="tituloMes" style="margin: 0 20px; font-size: 18px;"></strong>
                <button class="btn-mes" onclick="mudarMes(1)">Próximo Mês ▶</button>
            </div>

            <div style="overflow-x: auto;">
                <table id="tabelaContas">
                    <thead>
                        <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Quem Pagou</th><th>Status</th><th></th></tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>📊 Resumo do Mês</h3>
            <div>
                <div class="total-card">
                    <div>💙 Leonardo Pagou</div>
                    <div class="total-valor" id="totalLeo">R$ 0,00</div>
                </div>
                <div class="total-card">
                    <div>❤️ Anna Pagou</div>
                    <div class="total-valor" id="totalAnna">R$ 0,00</div>
                </div>
                <div class="total-card">
                    <div>📊 Total do Mês</div>
                    <div class="total-valor" id="totalGeral">R$ 0,00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBNLvNBcneAeqVZg51FSXJpp3KUx4vGIY0",
            authDomain: "controle-contas-casal.firebaseapp.com",
            projectId: "controle-contas-casal",
            storageBucket: "controle-contas-casal.firebasestorage.app",
            messagingSenderId: "369436914467",
            appId: "1:369436914467:web:e56a5fdbc27ec75509d296"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let todasContas = [];
        let anoAtual = new Date().getFullYear();
        let mesAtual = new Date().getMonth() + 1;

        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        function atualizarStatus(mensagem, status) {
            const el = document.getElementById('syncStatus');
            el.innerHTML = mensagem;
            el.className = `sync-status ${status}`;
        }

        // Carregar contas do Firebase
        async function carregarContas() {
            atualizarStatus("🔄 Carregando...", "");
            try {
                const docRef = db.collection('controleContas').doc('leonardo_anna');
                const doc = await docRef.get();
                
                if (doc.exists) {
                    const dados = doc.data();
                    todasContas = dados.expenses || [];
                    console.log("Contas carregadas:", todasContas.length);
                    atualizarStatus("✅ Conectado", "online");
                } else {
                    todasContas = [];
                    atualizarStatus("✅ Conectado", "online");
                }
                atualizarTabela();
                atualizarResumo();
            } catch (error) {
                console.error("Erro:", error);
                atualizarStatus("⚠️ Offline", "offline");
            }
        }

        // Salvar contas no Firebase
        async function salvarContas() {
            try {
                await db.collection('controleContas').doc('leonardo_anna').set({
                    expenses: todasContas,
                    ultimaAtualizacao: new Date().toISOString()
                });
                atualizarStatus("✅ Salvo", "online");
                return true;
            } catch (error) {
                console.error("Erro ao salvar:", error);
                atualizarStatus("⚠️ Erro ao salvar", "offline");
                return false;
            }
        }

        // Adicionar nova conta
        async function adicionarConta() {
            const data = document.getElementById('data').value;
            const descricao = document.getElementById('descricao').value.trim();
            const categoria = document.getElementById('categoria').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const quem = document.getElementById('quem').value;

            if (!data) { alert("Selecione a data!"); return; }
            if (!descricao) { alert("Digite a descrição!"); return; }
            if (isNaN(valor) || valor <= 0) { alert("Digite um valor válido!"); return; }

            const novaConta = {
                id: Date.now().toString(),
                date: data,
                description: descricao,
                category: categoria,
                amount: valor,
                who: quem,
                paid: false,
                paidDate: null
            };

            todasContas.push(novaConta);
            await salvarContas();
            
            // Limpar campos
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            
            atualizarTabela();
            atualizarResumo();
            alert(`✅ ${descricao} adicionada!`);
        }

        // Alternar status pago/pendente
        async function togglePago(id) {
            const conta = todasContas.find(c => c.id === id);
            if (conta) {
                conta.paid = !conta.paid;
                if (conta.paid) {
                    conta.paidDate = new Date().toISOString().split('T')[0];
                } else {
                    conta.paidDate = null;
                }
                await salvarContas();
                atualizarTabela();
                atualizarResumo();
            }
        }

        // Excluir conta
        async function excluirConta(id) {
            if (confirm("Excluir esta conta?")) {
                todasContas = todasContas.filter(c => c.id !== id);
                await salvarContas();
                atualizarTabela();
                atualizarResumo();
            }
        }

        // Filtrar contas do mês atual
        function getContasDoMes() {
            return todasContas.filter(conta => {
                const [ano, mes] = conta.date.split('-');
                return parseInt(ano) === anoAtual && parseInt(mes) === mesAtual;
            });
        }

        // Atualizar tabela
        function atualizarTabela() {
            const contasFiltradas = getContasDoMes();
            const tbody = document.getElementById('corpoTabela');
            document.getElementById('tituloMes').innerHTML = `${meses[mesAtual-1]} ${anoAtual}`;

            if (contasFiltradas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">📭 Nenhuma conta neste mês</td></tr>';
                return;
            }

            tbody.innerHTML = contasFiltradas.map(conta => `
                <tr>
                    <td>${conta.date}</td>
                    <td>${conta.description}</td>
                    <td>${conta.category || '-'}</td>
                    <td>R$ ${conta.amount.toFixed(2)}</td>
                    <td>${conta.who === 'Leonardo' ? '💙 Leonardo' : '❤️ Anna'}</td>
                    <td>
                        <input type="checkbox" ${conta.paid ? 'checked' : ''} onchange="togglePago('${conta.id}')">
                        ${conta.paid ? '<span class="pago"> Pago</span>' : '<span class="pendente"> Pendente</span>'}
                    </td>
                    <td><button onclick="excluirConta('${conta.id}')" style="background:#e74c3c; padding:5px 10px;">🗑️</button></td>
                </tr>
            `).join('');
        }

        // Atualizar resumo
        function atualizarResumo() {
            const contasFiltradas = getContasDoMes();
            let leoTotal = 0;
            let annaTotal = 0;

            contasFiltradas.forEach(conta => {
                if (conta.paid) {
                    if (conta.who === 'Leonardo') leoTotal += conta.amount;
                    else annaTotal += conta.amount;
                }
            });

            document.getElementById('totalLeo').innerHTML = `R$ ${leoTotal.toFixed(2)}`;
            document.getElementById('totalAnna').innerHTML = `R$ ${annaTotal.toFixed(2)}`;
            document.getElementById('totalGeral').innerHTML = `R$ ${(leoTotal + annaTotal).toFixed(2)}`;
        }

        // Mudar mês
        function mudarMes(delta) {
            let novoMes = mesAtual + delta;
            let novoAno = anoAtual;
            if (novoMes > 12) { novoMes = 1; novoAno++; }
            if (novoMes < 1) { novoMes = 12; novoAno--; }
            mesAtual = novoMes;
            anoAtual = novoAno;
            atualizarTabela();
            atualizarResumo();
        }

        // Data padrão
        document.getElementById('data').value = new Date().toISOString().split('T')[0];
        
        // Inicializar
        carregarContas();
    </script>
</body>
</html>
