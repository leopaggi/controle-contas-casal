<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Controle de Contas - Leonardo & Anna</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; padding: 16px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .header p { opacity: 0.85; font-size: 0.8rem; }
        
        .sync-status {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .online { background: #27ae60; color: white; }
        .offline { background: #e74c3c; color: white; }
        .carregando { background: #f39c12; color: white; }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 18px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            font-weight: 600;
            color: #1e3c72;
            font-size: 1rem;
        }
        .card-body { padding: 18px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #6c757d;
            margin-bottom: 5px;
        }
        input, select {
            padding: 10px 12px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            font-size: 0.85rem;
            outline: none;
        }
        input:focus, select:focus { border-color: #2a5298; }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-primary { background: #2a5298; color: white; }
        .btn-primary:hover { background: #1e3c72; transform: translateY(-1px); }
        .btn-danger { background: #e74c3c; color: white; padding: 5px 10px; }
        .btn-danger:hover { background: #c0392b; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background: #f8f9fa; font-size: 0.7rem; text-transform: uppercase; color: #6c757d; }
        tr:hover { background: #f8f9fa; }
        
        .status-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #27ae60; margin-right: 5px; }
        .pago { color: #27ae60; font-weight: bold; }
        .pendente { color: #f39c12; font-weight: bold; }
        .name-leo { color: #3b82f6; font-weight: 600; }
        .name-anna { color: #ec4899; font-weight: 600; }
        .money { font-family: monospace; font-weight: 600; }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            border-top: 3px solid;
        }
        .summary-card.leo { border-color: #3b82f6; }
        .summary-card.anna { border-color: #ec4899; }
        .summary-card.total { border-color: #2a5298; }
        .summary-card .label { font-size: 0.7rem; text-transform: uppercase; color: #6c757d; margin-bottom: 8px; }
        .summary-card .value { font-size: 1.6rem; font-weight: 700; }
        
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 12px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .month-nav button {
            background: #f0f2f5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        .month-nav button:hover { background: #e0e2e5; }
        .current-month { font-weight: 600; color: #1e3c72; font-size: 1rem; }
        
        .empty-state { text-align: center; padding: 40px; color: #adb5bd; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            z-index: 9999;
            font-size: 0.8rem;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 600px) {
            .summary-card .value { font-size: 1.2rem; }
            th, td { padding: 8px 5px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Controle de Contas</h1>
            <p>Leonardo 💙 & Anna Bárbara ❤️</p>
            <div id="syncStatus" class="sync-status carregando">🔄 Conectando...</div>
        </div>

        <div class="month-nav">
            <button onclick="mudarMes(-1)">◀</button>
            <span class="current-month" id="currentMonthDisplay">Junho 2026</span>
            <button onclick="mudarMes(1)">▶</button>
        </div>

        <div class="card">
            <div class="card-header">➕ Adicionar conta</div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>📅 Data</label>
                        <input type="date" id="expenseDate">
                    </div>
                    <div class="form-group">
                        <label>📋 Descrição</label>
                        <input type="text" id="expenseDesc" placeholder="Ex: Aluguel, Energia...">
                    </div>
                    <div class="form-group">
                        <label>🏷️ Categoria</label>
                        <select id="expenseCategory">
                            <option value="Moradia">🏠 Moradia</option>
                            <option value="Utilidades">💡 Utilidades</option>
                            <option value="Educação">📚 Educação</option>
                            <option value="Alimentação">🍎 Alimentação</option>
                            <option value="Saúde">🏥 Saúde</option>
                            <option value="Extras">🎉 Extras</option>
                            <option value="Outros">📌 Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>💰 Valor (R$)</label>
                        <input type="number" id="expenseAmount" step="0.01" placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label>👤 Quem pagou?</label>
                        <select id="expenseWho">
                            <option value="Leonardo">💙 Leonardo</option>
                            <option value="Anna">❤️ Anna Bárbara</option>
                        </select>
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <button class="btn btn-primary" onclick="adicionarConta()">✅ Adicionar</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📋 Contas do mês</div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Quem pagou</th><th>Status</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="expensesTableBody"></tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">📭 Nenhuma conta neste mês</div>
                </div>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card leo">
                <div class="label">💙 Leonardo pagou</div>
                <div class="value" id="leoTotals">R$ 0,00</div>
            </div>
            <div class="summary-card anna">
                <div class="label">❤️ Anna Bárbara pagou</div>
                <div class="value" id="annaTotal">R$ 0,00</div>
            </div>
            <div class="summary-card total">
                <div class="label">📊 Total do mês</div>
                <div class="value" id="totalMonth">R$ 0,00</div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURAÇÃO DO FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBNLvNBcneAeqVZg51FSXJpp3KUx4vGIY0",
            authDomain: "controle-contas-casal.firebaseapp.com",
            projectId: "controle-contas-casal",
            storageBucket: "controle-contas-casal.firebasestorage.app",
            messagingSenderId: "369436914467",
            appId: "1:369436914467:web:e56a5fdbc27ec75509d296"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ========== VARIÁVEIS GLOBAIS ==========
        let todasContas = [];
        let anoAtual = new Date().getFullYear();
        let mesAtual = new Date().getMonth() + 1;

        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        // ========== UTILITÁRIOS ==========
        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        function formatarDataBrasil(dataISO) {
            if (!dataISO) return '';
            const partes = dataISO.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function mostrarToast(mensagem) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function atualizarStatus(mensagem, tipo) {
            const el = document.getElementById('syncStatus');
            el.innerHTML = mensagem;
            el.className = `sync-status ${tipo}`;
        }

        // ========== FUNÇÕES DO FIREBASE ==========
        async function carregarContas() {
            atualizarStatus("🔄 Carregando...", "carregando");
            try {
                const docRef = db.collection('controleContas').doc('leonardo_anna');
                const doc = await docRef.get();
                
                if (doc.exists) {
                    const dados = doc.data();
                    todasContas = dados.expenses || [];
                    console.log("✅ Contas carregadas:", todasContas.length);
                    atualizarStatus("✅ Online", "online");
                } else {
                    todasContas = [];
                    atualizarStatus("✅ Online", "online");
                }
                atualizarTabela();
                atualizarResumo();
            } catch (error) {
                console.error("Erro:", error);
                atualizarStatus("⚠️ Offline", "offline");
                atualizarTabela();
                atualizarResumo();
            }
        }

        async function salvarContas() {
            try {
                await db.collection('controleContas').doc('leonardo_anna').set({
                    expenses: todasContas,
                    ultimaAtualizacao: new Date().toISOString()
                });
                atualizarStatus("✅ Salvo", "online");
                return true;
            } catch (error) {
                console.error("Erro ao salvar:", error);
                atualizarStatus("⚠️ Offline", "offline");
                return false;
            }
        }

        // ========== FUNÇÕES DA TABELA ==========
        function getContasDoMes() {
            return todasContas.filter(conta => {
                const [ano, mes] = conta.date.split('-');
                return parseInt(ano) === anoAtual && parseInt(mes) === mesAtual;
            });
        }

        function atualizarTabela() {
            const contasFiltradas = getContasDoMes();
            const tbody = document.getElementById('expensesTableBody');
            const emptyState = document.getElementById('emptyState');
            document.getElementById('currentMonthDisplay').innerHTML = `${meses[mesAtual-1]} ${anoAtual}`;

            if (contasFiltradas.length === 0) {
                emptyState.style.display = 'block';
                tbody.innerHTML = '';
                return;
            }

            emptyState.style.display = 'none';
            
            // Ordenar: mais recentes primeiro
            const contasOrdenadas = [...contasFiltradas].sort((a, b) => b.date.localeCompare(a.date));

            tbody.innerHTML = contasOrdenadas.map(conta => {
                const nomeClasse = conta.who === 'Leonardo' ? 'name-leo' : 'name-anna';
                const nomeTexto = conta.who === 'Leonardo' ? '💙 Leonardo' : '❤️ Anna';
                const statusTexto = conta.paid ? '<span class="pago">✅ Pago</span>' : '<span class="pendente">⏳ Pendente</span>';
                
                return `
                    <tr>
                        <td>${formatarDataBrasil(conta.date)}</td>
                        <td>${conta.description}</td>
                        <td>${conta.category || '-'}</td>
                        <td class="money">${formatarMoeda(conta.amount)}</td>
                        <td><span class="${nomeClasse}">${nomeTexto}</span></td>
                        <td>
                            <input type="checkbox" class="status-checkbox" ${conta.paid ? 'checked' : ''} onchange="togglePago('${conta.id}')">
                            ${statusTexto}
                        </td>
                        <td><button class="btn-danger" onclick="excluirConta('${conta.id}')">🗑️</button></td>
                    </table>
                `;
            }).join('');
        }

        function atualizarResumo() {
            const contasFiltradas = getContasDoMes();
            let leoTotal = 0;
            let annaTotal = 0;

            contasFiltradas.forEach(conta => {
                if (conta.paid) {
                    if (conta.who === 'Leonardo') leoTotal += conta.amount;
                    else annaTotal += conta.amount;
                }
            });

            document.getElementById('leoTotals').innerHTML = formatarMoeda(leoTotal);
            document.getElementById('annaTotal').innerHTML = formatarMoeda(annaTotal);
            document.getElementById('totalMonth').innerHTML = formatarMoeda(leoTotal + annaTotal);
        }

        // ========== CRUD ==========
        async function adicionarConta() {
            const data = document.getElementById('expenseDate').value;
            const descricao = document.getElementById('expenseDesc').value.trim();
            const categoria = document.getElementById('expenseCategory').value;
            const valor = parseFloat(document.getElementById('expenseAmount').value);
            const quem = document.getElementById('expenseWho').value;

            if (!data) { mostrarToast("❌ Selecione a data!"); return; }
            if (!descricao) { mostrarToast("❌ Digite a descrição!"); return; }
            if (isNaN(valor) || valor <= 0) { mostrarToast("❌ Digite um valor válido!"); return; }

            const novaConta = {
                id: Date.now().toString(),
                date: data,
                description: descricao,
                category: categoria,
                amount: valor,
                who: quem,
                paid: false,
                paidDate: null
            };

            todasContas.push(novaConta);
            await salvarContas();
            
            document.getElementById('expenseDesc').value = '';
            document.getElementById('expenseAmount').value = '';
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
            
            atualizarTabela();
            atualizarResumo();
            mostrarToast(`✅ ${descricao} adicionada!`);
        }

        async function togglePago(id) {
            const conta = todasContas.find(c => c.id === id);
            if (conta) {
                conta.paid = !conta.paid;
                conta.paidDate = conta.paid ? new Date().toISOString().split('T')[0] : null;
                await salvarContas();
                atualizarTabela();
                atualizarResumo();
                mostrarToast(conta.paid ? `✅ ${conta.description} paga` : `⏳ ${conta.description} pendente`);
            }
        }

        async function excluirConta(id) {
            if (confirm("🗑️ Excluir esta conta permanentemente?")) {
                todasContas = todasContas.filter(c => c.id !== id);
                await salvarContas();
                atualizarTabela();
                atualizarResumo();
                mostrarToast("🗑️ Conta removida!");
            }
        }

        function mudarMes(delta) {
            let novoMes = mesAtual + delta;
            let novoAno = anoAtual;
            if (novoMes > 12) { novoMes = 1; novoAno++; }
            if (novoMes < 1) { novoMes = 12; novoAno--; }
            mesAtual = novoMes;
            anoAtual = novoAno;
            atualizarTabela();
            atualizarResumo();
        }

        // ========== INICIALIZAÇÃO ==========
        document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
        carregarContas();
    </script>
</body>
</html>
