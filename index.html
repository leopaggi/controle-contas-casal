<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Controle de Contas - Leonardo & Anna</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f2f5; padding: 16px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .header p { opacity: 0.85; font-size: 0.8rem; }
        
        .sync-status {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .sync-success { background: #27ae60; color: white; }
        .sync-error { background: #e74c3c; color: white; }
        .sync-loading { background: #f39c12; color: white; }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 18px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            font-weight: 600;
            color: #1e3c72;
        }
        .card-body { padding: 18px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #6c757d;
            margin-bottom: 5px;
        }
        input, select {
            padding: 10px 12px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            font-size: 0.85rem;
            outline: none;
        }
        input:focus, select:focus { border-color: #2a5298; }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-primary { background: #2a5298; color: white; }
        .btn-primary:hover { background: #1e3c72; }
        
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background: #f8f9fa; font-size: 0.7rem; text-transform: uppercase; color: #6c757d; }
        tr:hover { background: #f8f9fa; }
        
        .status-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #27ae60; }
        .delete-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #adb5bd; }
        .delete-btn:hover { color: #e74c3c; }
        .name-leo { color: #3b82f6; font-weight: 600; }
        .name-anna { color: #ec4899; font-weight: 600; }
        .money { font-family: monospace; font-weight: 600; }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .summary-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            border-top: 3px solid;
        }
        .summary-card.leo { border-color: #3b82f6; }
        .summary-card.anna { border-color: #ec4899; }
        .summary-card.total { border-color: #2a5298; }
        .summary-card .label { font-size: 0.7rem; text-transform: uppercase; color: #6c757d; margin-bottom: 8px; }
        .summary-card .value { font-size: 1.6rem; font-weight: 700; }
        
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 12px 18px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .month-nav button {
            background: #f0f2f5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        .current-month { font-weight: 600; color: #1e3c72; }
        .empty-state { text-align: center; padding: 40px; color: #adb5bd; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            z-index: 9999;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            .summary-card .value { font-size: 1.2rem; }
            th, td { padding: 8px 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Controle de Contas</h1>
            <p>Leonardo 💙 & Anna Bárbara ❤️</p>
            <div id="sync-status" class="sync-status sync-loading">🔄 Conectando...</div>
        </div>

        <div class="month-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <span class="current-month" id="current-month-display">Junho 2026</span>
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <div class="card">
            <div class="card-header">➕ Adicionar conta</div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group"><label>📅 Data</label><input type="date" id="expense-date"></div>
                    <div class="form-group"><label>📋 Descrição</label><input type="text" id="expense-desc" placeholder="Ex: Aluguel"></div>
                    <div class="form-group"><label>🏷️ Categoria</label>
                        <select id="expense-category">
                            <option value="Moradia">🏠 Moradia</option>
                            <option value="Utilidades">💡 Utilidades</option>
                            <option value="Educação">📚 Educação</option>
                            <option value="Alimentação">🍎 Alimentação</option>
                            <option value="Saúde">🏥 Saúde</option>
                            <option value="Extras">🎉 Extras</option>
                            <option value="Outros">📌 Outros</option>
                        </select>
                    </div>
                    <div class="form-group"><label>💰 Valor (R$)</label><input type="number" id="expense-amount" step="0.01" placeholder="0,00"></div>
                    <div class="form-group"><label>👤 Quem pagou?</label>
                        <select id="expense-who"><option value="Leonardo">💙 Leonardo</option><option value="Anna">❤️ Anna Bárbara</option></select>
                    </div>
                    <div class="form-group" style="justify-content: flex-end;"><button class="btn btn-primary" onclick="addExpense()">✅ Adicionar</button></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📋 Contas do mês</div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Quem pagou</th><th>Status</th><th>Data Pagto</th><th></th></tr>
                        </thead>
                        <tbody id="expenses-tbody"></tbody>
                    </table>
                    <div id="empty-state" class="empty-state" style="display: none;">📭 Nenhuma conta neste mês</div>
                </div>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card leo"><div class="label">💙 Leonardo pagou</div><div class="value" id="leo-total">R$ 0,00</div></div>
            <div class="summary-card anna"><div class="label">❤️ Anna Bárbara pagou</div><div class="value" id="anna-total">R$ 0,00</div></div>
            <div class="summary-card total"><div class="label">📊 Total do mês</div><div class="value" id="total-month">R$ 0,00</div></div>
        </div>
    </div>

    <script>
        // ========== SUAS CONFIGURAÇÕES DO FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBNLvNBcneAeqVZg51FSXJpp3KUx4vGIY0",
            authDomain: "controle-contas-casal.firebaseapp.com",
            projectId: "controle-contas-casal",
            storageBucket: "controle-contas-casal.firebasestorage.app",
            messagingSenderId: "369436914467",
            appId: "1:369436914467:web:e56a5fdbc27ec75509d296"
        };
        // =====================================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allExpenses = [];
        let currentYear = 2026;
        let currentMonth = 6;

        const syncStatus = document.getElementById('sync-status');
        const currentMonthDisplay = document.getElementById('current-month-display');
        const expensesTbody = document.getElementById('expenses-tbody');
        const emptyState = document.getElementById('empty-state');
        const leoTotalEl = document.getElementById('leo-total');
        const annaTotalEl = document.getElementById('anna-total');
        const totalMonthEl = document.getElementById('total-month');

        function formatCurrency(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); }
        function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
        function showToast(msg) { const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function updateSyncStatus(s,m) { syncStatus.textContent=m; syncStatus.className=`sync-status sync-${s}`; }

        async function loadExpenses() {
            try {
                updateSyncStatus('loading','🔄 Carregando...');
                const doc = await db.collection('controleContas').doc('leonardo_anna').get();
                if(doc.exists) { allExpenses = doc.data().expenses || []; }
                else { allExpenses = []; }
                updateSyncStatus('success','✅ Online');
                renderCurrentMonth();
                updateSummary();
            } catch(e) {
                updateSyncStatus('error','⚠️ Offline');
                renderCurrentMonth();
                updateSummary();
            }
        }

        async function saveExpenses() {
            try {
                await db.collection('controleContas').doc('leonardo_anna').set({ expenses: allExpenses });
                updateSyncStatus('success','✅ Salvo');
                return true;
            } catch(e) {
                updateSyncStatus('error','⚠️ Offline');
                return false;
            }
        }

        function getFiltered() { return allExpenses.filter(e => { const [y,m]=e.date.split('-'); return parseInt(y)===currentYear && parseInt(m)===currentMonth; }); }
        
        function renderCurrentMonth() {
            const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            currentMonthDisplay.textContent = `${meses[currentMonth-1]} ${currentYear}`;
            const filtered = getFiltered();
            if(filtered.length===0) { emptyState.style.display='block'; expensesTbody.innerHTML=''; return; }
            emptyState.style.display='none';
            const sorted = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));
            expensesTbody.innerHTML = sorted.map(e => {
                const nameClass = e.who==='Leonardo'?'name-leo':'name-anna';
                const nameText = e.who==='Leonardo'?'💙 Leonardo':'❤️ Anna';
                return `<tr>
                    <td>${formatDate(e.date)}</td>
                    <td>${e.description}</td>
                    <td>${e.category||'-'}</td>
                    <td class="money">${formatCurrency(e.amount)}</td>
                    <td><span class="${nameClass}">${nameText}</span></td>
                    <td><input type="checkbox" class="status-checkbox" ${e.paid?'checked':''} onchange="togglePaidStatus('${e.id}')"></td>
                    <td>${e.paidDate?formatDate(e.paidDate):'-'}</td>
                    <td><button class="delete-btn" onclick="deleteExpense('${e.id}')">🗑️</button></td>
                </tr>`;
            }).join('');
        }
        
        function updateSummary() {
            const filtered = getFiltered();
            let leo=0, anna=0;
            filtered.forEach(e => { if(e.paid) { if(e.who==='Leonardo') leo+=e.amount; else anna+=e.amount; } });
            leoTotalEl.textContent=formatCurrency(leo);
            annaTotalEl.textContent=formatCurrency(anna);
            totalMonthEl.textContent=formatCurrency(leo+anna);
        }

        async function addExpense() {
            const date=document.getElementById('expense-date').value;
            const desc=document.getElementById('expense-desc').value.trim();
            const cat=document.getElementById('expense-category').value;
            const amount=parseFloat(document.getElementById('expense-amount').value);
            const who=document.getElementById('expense-who').value;
            if(!date){showToast('Selecione a data!');return;}
            if(!desc){showToast('Digite a descrição!');return;}
            if(isNaN(amount)||amount<=0){showToast('Valor inválido!');return;}
            allExpenses.push({ id:Date.now().toString(), date, description:desc, category:cat, amount, who, paid:false, paidDate:null });
            await saveExpenses();
            document.getElementById('expense-desc').value='';
            document.getElementById('expense-amount').value='';
            document.getElementById('expense-date').value=new Date().toISOString().split('T')[0];
            renderCurrentMonth();
            updateSummary();
            showToast(`✅ ${desc} adicionada!`);
        }

        async function togglePaidStatus(id) {
            const e = allExpenses.find(x=>x.id===id);
            if(e) { e.paid=!e.paid; e.paidDate=e.paid?new Date().toISOString().split('T')[0]:null; await saveExpenses(); renderCurrentMonth(); updateSummary(); showToast(e.paid?`✅ ${e.description} paga`:`⏳ ${e.description} pendente`); }
        }

        async function deleteExpense(id) {
            if(confirm('Excluir esta conta?')) { allExpenses=allExpenses.filter(x=>x.id!==id); await saveExpenses(); renderCurrentMonth(); updateSummary(); showToast('🗑️ Conta removida!'); }
        }

        function changeMonth(delta) { let m=currentMonth+delta, y=currentYear; if(m>12){m=1;y++;}else if(m<1){m=12;y--;} currentMonth=m; currentYear=y; renderCurrentMonth(); updateSummary(); }

        function setDefaultDate() { document.getElementById('expense-date').value=new Date().toISOString().split('T')[0]; }
        
        document.addEventListener('DOMContentLoaded', async () => { setDefaultDate(); await loadExpenses(); });
    </script>
</body>
</html>
